apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-content
  namespace: registro-atividades
data:
  index.html: |
    <!doctype html>
    <html lang="pt-BR">
    <head>
      <meta charset="utf-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1" />
      <title>Registro Star Wars</title>
      <style>
        :root {
          --bg: #050816;
          --panel: rgba(8, 15, 32, 0.86);
          --line: rgba(255, 255, 255, 0.12);
          --accent: #f4c95d;
          --accent-2: #7dd3fc;
          --text: #f8fafc;
          --muted: #cbd5e1;
        }
        * { box-sizing: border-box; }
        html, body { height: 100%; }
        body {
          margin: 0;
          font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
          color: var(--text);
          background:
            radial-gradient(circle at top left, rgba(244, 201, 93, 0.18), transparent 28%),
            radial-gradient(circle at top right, rgba(125, 211, 252, 0.14), transparent 30%),
            linear-gradient(135deg, #02040b, var(--bg));
        }
        .frame {
          min-height: 100vh;
          display: grid;
          place-items: center;
          padding: 24px;
        }
        .card {
          width: min(100%, 920px);
          padding: 32px;
          border: 1px solid var(--line);
          border-radius: 28px;
          background: var(--panel);
          box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
          backdrop-filter: blur(10px);
        }
        .topline {
          display: inline-flex;
          gap: 10px;
          align-items: center;
          padding: 8px 14px;
          border-radius: 999px;
          border: 1px solid rgba(244, 201, 93, 0.25);
          color: var(--accent);
          background: rgba(244, 201, 93, 0.08);
          font-size: 12px;
          letter-spacing: 0.16em;
          text-transform: uppercase;
        }
        h1 {
          margin: 18px 0 12px;
          font-size: clamp(2.4rem, 7vw, 4.8rem);
          line-height: 0.98;
        }
        .subtitle {
          margin: 0;
          max-width: 62ch;
          color: var(--muted);
          font-size: 1.05rem;
          line-height: 1.7;
        }
        .grid {
          display: grid;
          grid-template-columns: repeat(3, minmax(0, 1fr));
          gap: 16px;
          margin-top: 28px;
        }
        .panel {
          padding: 18px;
          border: 1px solid var(--line);
          border-radius: 20px;
          background: rgba(255, 255, 255, 0.03);
        }
        .panel strong {
          display: block;
          margin-bottom: 8px;
          color: var(--accent-2);
          font-size: 0.95rem;
          letter-spacing: 0.08em;
          text-transform: uppercase;
        }
        .panel p {
          margin: 0;
          color: var(--muted);
          line-height: 1.6;
        }
        .actions {
          display: flex;
          flex-wrap: wrap;
          gap: 12px;
          margin-top: 28px;
        }
        .button {
          display: inline-flex;
          align-items: center;
          justify-content: center;
          min-width: 180px;
          padding: 14px 18px;
          border-radius: 14px;
          border: 1px solid transparent;
          text-decoration: none;
          font-weight: 700;
        }
        .button.primary {
          color: #111827;
          background: linear-gradient(135deg, #f4c95d, #f7e7a2);
        }
        .button.secondary {
          color: var(--text);
          border-color: rgba(125, 211, 252, 0.28);
          background: rgba(125, 211, 252, 0.08);
        }
        .foot {
          margin-top: 26px;
          color: rgba(248, 250, 252, 0.7);
          font-size: 0.92rem;
        }
        @media (max-width: 720px) {
          .card { padding: 22px; }
          .grid { grid-template-columns: 1fr; }
          .button { width: 100%; }
        }
      </style>
    </head>
    <body>
      <main class="frame">
        <section class="card">
          <span class="topline">Registro Star Wars</span>
          <h1>Uma interface simples e visivel</h1>
          <p class="subtitle">
            Esta pagina foi criada para abrir no navegador imediatamente, sem depender
            do backend. Ela funciona como frente inicial do projeto e pode ser ligada
            depois a API e ao PostgreSQL.
          </p>

          <div class="grid">
            <article class="panel">
              <strong>Frontend</strong>
              <p>Pagina estatica servida por Nginx com visual responsivo.</p>
            </article>
            <article class="panel">
              <strong>API</strong>
              <p>Espaco reservado para integrar os dados quando o backend estiver pronto.</p>
            </article>
            <article class="panel">
              <strong>Banco</strong>
              <p>PostgreSQL segue no cluster como camada de persistencia do sistema.</p>
            </article>
          </div>

          <div class="actions">
            <a class="button primary" href="#">Abrir frontend</a>
            <a class="button secondary" href="#">Ver arquitetura</a>
          </div>

          <p class="foot">Se voce esta vendo esta pagina, o frontend esta funcionando.</p>
        </section>
      </main>
    </body>
    </html>
